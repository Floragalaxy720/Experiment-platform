<script>
  const jsPsych = initJsPsych({
    on_finish: function () {
      const data = jsPsych.data.get().csv();
      console.log(data);
      jsPsych.data.displayData();
    }
  });

  const stimuli = ["A", "B", "A", "C", "A", "B", "A"];
  let timeline = [];

  for (let i = 0; i < stimuli.length; i++) {
    let current = stimuli[i];
    let isMatch = false;

    if (i >= 2 && stimuli[i] === stimuli[i - 2]) {
      isMatch = true;
    }

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<h1>${current}</h1>`,
      choices: ["f", "j"],
      prompt: "<p>F = match (2-back), J = no match</p>",
      trial_duration: 1500,

      data: {
        stimulus: current,
        match: isMatch
      },

      on_finish: function (data) {
        if (data.response === "f" && data.match === true) {
          data.correct = 1;
        } else if (data.response === "j" && data.match === false) {
          data.correct = 1;
        } else {
          data.correct = 0;
        }
      }
    });
  }

  jsPsych.run(timeline);
</script>
