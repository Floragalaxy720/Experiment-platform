<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>N-back Experiment</title>

  <!-- jsPsych 核心 -->
  <script src="https://unpkg.com/jspsych@7.3.0/dist/jspsych.js"></script>
  <link href="https://unpkg.com/jspsych@7.3.0/dist/css/jspsych.css" rel="stylesheet" />

  <!-- 插件（⚠️这里是关键） -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2/dist/index.browser.js"></script>
</head>

<body></body>

<script>
  const jsPsych = initJsPsych({
    on_finish: function () {
      jsPsych.data.displayData();
    }
  });

  const stimuli = ["A", "B", "A", "C", "A", "B", "A"];
  let timeline = [];

  for (let i = 0; i < stimuli.length; i++) {
    let current = stimuli[i];
    let isMatch = false;

    if (i >= 2 && stimuli[i] === stimuli[i - 2]) {
      isMatch = true;
    }

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<h1>${current}</h1>`,
      choices: ["f", "j"],
      trial_duration: 1500,
      prompt: "<p>F = match, J = no match</p>",

      data: {
        stimulus: current,
        match: isMatch
      },

      on_finish: function (data) {
        data.correct =
          (data.response === "f" && data.match) ||
          (data.response === "j" && !data.match) ? 1 : 0;
      }
    });
  }

  jsPsych.run(timeline);
</script>
</html>
