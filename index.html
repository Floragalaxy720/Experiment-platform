<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>N-back Experiment</title>
  <script src="jspsych.js"></script>
  <link href="jspsych.css" rel="stylesheet" />
  <script src="plugin-html-keyboard-response.js"></script>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
    }
    .letter-display {
      font-size: 120px;
      font-family: monospace;
      font-weight: bold;
      color: #e0e0ff;
      line-height: 1;
      margin-top: 80px;
    }
    .instruction-box {
      max-width: 600px;
      margin: 60px auto;
      font-size: 20px;
      line-height: 1.8;
      background: #16213e;
      padding: 40px;
      border-radius: 12px;
    }
    .phase-label {
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }
    #energyRing {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 12px solid #333;
      margin: 30px auto 0 auto;
      transition: border-color 0.5s;
    }
    .fixation {
      font-size: 60px;
      margin-top: 100px;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <script>
  // =====================================================
  // 0. 基础配置
  // =====================================================
  const N_BACK = 2;
  const LETTERS = ['B', 'C', 'D', 'F', 'G', 'H', 'J', 'K']; // 8个辅音字母
  const STIM_DURATION = 500;   // 字母显示时长 ms
  const TRIAL_DURATION = 2000; // 每个trial总时长 ms（含空白ISI）
  const TARGET_RATE = 0.33;    // 约33%的trial是匹配目标

  // 每分钟trial数 = 60000ms / 2000ms = 30个
  // 各阶段trial数：
  const BLOCK_TRIALS = {
    warmup:    30,   // 热身 1min (1-back)
    highload:  60,   // 高负荷 2min
    drift:     60,   // 自然漂移 2min
    blockA:    45,   // Block A 1.5min
    blockB:    30,   // Block B 1min
    blockC:    60,   // Block C 2min
    blockD1:   90,   // Block D-1 3min
    blockD2:   90,   // Block D-2 3min
  };

  // =====================================================
  // 1. 序列生成函数
  // =====================================================
  function generateSequence(numTrials, nBack, targetRate) {
    const sequence = [];
    const isTarget = [];

    for (let i = 0; i < numTrials; i++) {
      if (i >= nBack && Math.random() < targetRate) {
        // 目标trial：复现n个之前的字母
        sequence.push(sequence[i - nBack]);
        isTarget.push(true);
      } else {
        // 非目标trial：选一个不等于n-back位置的字母
        let letter;
        let attempts = 0;
        do {
          letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
          attempts++;
        } while (i >= nBack && letter === sequence[i - nBack] && attempts < 20);
        sequence.push(letter);
        isTarget.push(false);
      }
    }
    return { sequence, isTarget };
  }

  // =====================================================
  // 2. 生成所有阶段的序列（页面加载时一次性生成）
  // =====================================================
  const sequences = {
    warmup:   generateSequence(BLOCK_TRIALS.warmup,   1, TARGET_RATE), // 热身用1-back
    highload: generateSequence(BLOCK_TRIALS.highload,  2, TARGET_RATE),
    drift:    generateSequence(BLOCK_TRIALS.drift,     2, TARGET_RATE),
    blockA:   generateSequence(BLOCK_TRIALS.blockA,    2, TARGET_RATE),
    blockB:   generateSequence(BLOCK_TRIALS.blockB,    2, TARGET_RATE),
    blockC:   generateSequence(BLOCK_TRIALS.blockC,    2, TARGET_RATE),
    blockD1:  generateSequence(BLOCK_TRIALS.blockD1,   2, TARGET_RATE),
    blockD2:  generateSequence(BLOCK_TRIALS.blockD2,   2, TARGET_RATE),
  };

  // =====================================================
  // 3. 能量环更新（后续接真实数据，现在用随机）
  // =====================================================
  let energyRingEl = null;
  function updateEnergyRing(level) {
    if (!energyRingEl) energyRingEl = document.getElementById('energyRing');
    if (!energyRingEl) return;
    if (level < 40) energyRingEl.style.borderColor = '#e74c3c';
    else if (level < 70) energyRingEl.style.borderColor = '#f39c12';
    else energyRingEl.style.borderColor = '#2ecc71';
  }

  // =====================================================
  // 4. 创建N-back trial列表
  // =====================================================
  function createNBackBlock(seqObj, blockName, showFeedback, nBack) {
    const { sequence, isTarget } = seqObj;
    const trials = [];

    sequence.forEach((letter, i) => {
      // 注视点（+）
      trials.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div class="fixation">+</div>',
        choices: 'NO_KEYS',
        trial_duration: 300,
        data: { phase: blockName, trial_type: 'fixation' }
      });

      // 字母刺激
      trials.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return `
            <div class="letter-display">${letter}</div>
            <div class="phase-label">${blockName} | Trial ${i+1}/${sequence.length}</div>
            <div id="energyRing"></div>
          `;
        },
        choices: ['a', 'l'],
        trial_duration: TRIAL_DURATION,
        stimulus_duration: STIM_DURATION,
        on_start: function() {
          // 能量环随机（后续替换为真实算法）
          setTimeout(() => updateEnergyRing(Math.random() * 100), 100);
        },
        on_finish: function(data) {
          const responded = data.response !== null;
          const correct =
            (isTarget[i] && data.response === 'l') ||
            (!isTarget[i] && (data.response === 'a' || !responded));

          data.phase = blockName;
          data.trial_index_in_block = i;
          data.letter = letter;
          data.is_target = isTarget[i];
          data.responded = responded;
          data.correct = correct;
          data.rt = data.rt;
        }
      });

      // 练习阶段的即时反馈
      if (showFeedback) {
        trials.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: function() {
            const last = jsPsych.data.get().last(1).values()[0];
            const color = last.correct ? '#2ecc71' : '#e74c3c';
            const text = last.correct ? '✓ 正确' : '✗ 错误';
            return `<div style="font-size:50px; color:${color}; margin-top:100px">${text}</div>`;
          },
          choices: 'NO_KEYS',
          trial_duration: 500,
          data: { phase: blockName, trial_type: 'feedback' }
        });
      }
    });

    return trials;
  }

  // =====================================================
  // 5. 指导语模板
  // =====================================================
  function makeInstruction(htmlContent, key = ' ') {
    return {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="instruction-box">${htmlContent}<br><br><span style="color:#888;font-size:16px">按空格键继续</span></div>`,
      choices: [key],
    };
  }

  // =====================================================
  // 6. 休息阶段
  // =====================================================
  function makeRest(seconds, label) {
    return {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction-box">
          <p style="font-size:28px">🕐 ${label}</p>
          <p>请闭眼休息 ${seconds} 秒</p>
          <p style="color:#888;font-size:16px">休息结束后按空格键继续</p>
        </div>`,
      choices: [' '],
    };
  }

  // =====================================================
  // 7. 组装完整实验 Timeline
  // =====================================================
  const jsPsych = initJsPsych({
    display_element: 'jspsych-target',
    on_finish: function() {
      // 暂时显示数据，Step 9 改成 EmailJS 发送
      const data = jsPsych.data.get().filter({ trial_type: 'html-keyboard-response' });
      console.log('实验结束，数据条数:', data.count());
      jsPsych.data.displayData('csv');
    }
  });

  const timeline = [];

  // ── 全局指导语 ──
  timeline.push(makeInstruction(`
    <h2>欢迎参加本实验</h2>
    <p>本实验共约 <strong>17.5 分钟</strong>，请保持专注。</p>
    <p>实验过程中需要开启摄像头，请允许浏览器访问。</p>
    <p>你将看到屏幕中央出现一系列字母，<br>
    每次出现时请判断：<br>
    这个字母是否与 <strong>2个之前</strong> 的字母相同？</p>
    <p>🔵 相同（目标）→ 按 <strong>L</strong><br>
    🔴 不同（非目标）→ 按 <strong>A</strong></p>
  `));

  // ── 热身阶段（1-back + 反馈，可跳过）──
  timeline.push(makeInstruction(`
    <h2>🔥 热身阶段（1-back）</h2>
    <p>现在是 <strong>1-back</strong>：判断字母是否与<strong>上一个</strong>相同。</p>
    <p>此阶段有即时反馈，帮助你熟悉操作。</p>
    <p>按空格开始，或按 <strong>S</strong> 键跳过热身。</p>
  `, ' '));

  // 热身trials（1-back，有反馈）
  const warmupTrials = createNBackBlock(sequences.warmup, '热身(1-back)', true, 1);
  timeline.push(...warmupTrials);

  // ── 高负荷阶段 ──
  timeline.push(makeInstruction(`
    <h2>⚡ 阶段一：高负荷（2-back）</h2>
    <p>现在切换到 <strong>2-back</strong>：判断是否与 <strong>2个之前</strong> 的字母相同。</p>
    <p>此阶段 <strong>无反馈</strong>，请尽力作答。</p>
  `));
  timeline.push(...createNBackBlock(sequences.highload, '高负荷', false, 2));

  // ── 自然漂移窗口 ──
  timeline.push(makeInstruction(`
    <h2>📊 阶段二：自然漂移窗口</h2>
    <p>继续 2-back 任务，保持正常节奏。</p>
    <p>系统将在此阶段建立你的基准状态。</p>
  `));
  timeline.push(...createNBackBlock(sequences.drift, '漂移窗口', false, 2));

  // ── Block A：仅眨眼频率 ──
  timeline.push(makeInstruction(`
    <h2>Block A</h2>
    <p>继续 2-back 任务（约1.5分钟）。</p>
    <p>能量环将根据你的<strong>眨眼频率</strong>变化。</p>
  `));
  timeline.push(...createNBackBlock(sequences.blockA, 'Block_A', false, 2));

  // ── Block B：仅头部姿态 ──
  timeline.push(makeInstruction(`
    <h2>Block B</h2>
    <p>继续 2-back 任务（约1分钟）。</p>
    <p>能量环将根据你的<strong>头部姿态</strong>变化。</p>
  `));
  timeline.push(...createNBackBlock(sequences.blockB, 'Block_B', false, 2));

  // ── Block C：仅键盘节律 ──
  timeline.push(makeInstruction(`
    <h2>Block C</h2>
    <p>继续 2-back 任务（约2分钟）。</p>
    <p>能量环将根据你的<strong>按键节律</strong>变化。</p>
  `));
  timeline.push(...createNBackBlock(sequences.blockC, 'Block_C', false, 2));

  // ── Block D-1：三信号融合 ──
  timeline.push(makeInstruction(`
    <h2>Block D-1：三信号融合</h2>
    <p>继续 2-back 任务（约3分钟）。</p>
    <p>能量环现在综合<strong>眨眼 + 头部 + 按键</strong>三种信号。</p>
  `));
  timeline.push(...createNBackBlock(sequences.blockD1, 'Block_D1', false, 2));

  // ── 清洗期 ──
  timeline.push(makeRest(60, '清洗期休息'));

  // ── Block D-2：三信号融合对照 ──
  timeline.push(makeInstruction(`
    <h2>Block D-2：对照条件</h2>
    <p>最后一段 2-back 任务（约3分钟）。</p>
  `));
  timeline.push(...createNBackBlock(sequences.blockD2, 'Block_D2', false, 2));

  // ── 结束占位（Step 10 替换为 NASA-TLX）──
  timeline.push(makeInstruction(`
    <h2>🎉 实验完成！</h2>
    <p>感谢你的参与。</p>
    <p>数据正在提交，请稍候...</p>
    <p>（问卷将在下一步骤中加入）</p>
  `));

  // ── 启动 ──
  jsPsych.run(timeline);

  </script>
</body>
</html>
