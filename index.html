<script>
// ============================================================
// 0. 随机分配 D1/D2 真伪反馈（页面加载时决定）
// ============================================================
const D1_IS_TRUE = Math.random() < 0.5;
const D2_IS_TRUE = !D1_IS_TRUE;

// ============================================================
// 1. 全局状态
// ============================================================
const state = {
  cameraReady: false,
  video: null,

  // 眨眼
  EAR_THRESHOLD: 0.21,
  EAR_CONSEC: 2,
  earBelowCount: 0,
  blinkTimestamps: [],
  blinkRate: 0,

  // 头部姿态
  headYaw: 0,
  headPitch: 0,

  // 键盘节律
  rtHistory: [],
  rtCV: 0,

  // 能量
  energyLevel: 50,
  fakeEnergy: 50,
  currentBlock: 'none',

  // 基线统计（漂移窗口后由 computeBaseline() 填充）
  baseline: null,

  // OLS 回归结果：自然漂移斜率 β 和截距 Ŝ_baseline（computeBaseline() 填充）
  // 论文说明：β 单位为「信号变化量/秒」，截距为漂移窗口回归直线在 t=0 的估计值
  driftBeta:      { blink: 0, head: 0, rtCV: 0 },   // 自然漂移斜率
  driftIntercept: { blink: 15, head: 0.1, rtCV: 0.25 }, // 截距 Ŝ_baseline
  driftEndTime:   null,   // computeBaseline() 调用时刻（漂移修正 t=0 基准）

  // 信号方向系数（computeDirectionCoeff() 在 A/B/C 各自结束后填充）
  // +1 = 信号高→认知状态好，-1 = 信号高→状态差；默认 -1（保守假设）
  directionBlink: -1,
  directionHead:  -1,
  directionRT:    -1,
  directionLog:   [],   // [{ block, signal, r }]，供 buildEmailBody 读取

  // ── 自然回归系数 β（漂移窗口 WLS 估计，无反馈条件）
  // 论文说明：β 在模型 S_{t+1}=S_t-β·ΔS_t 中量化系统内在调节强度，
  //   由漂移窗口相邻 trial 间的 z 分变化与偏差的比值 WLS 聚合得到
  naturalBeta: { blink: 0, head: 0, rtCV: 0 },

  // ── 逐 trial γ̂ 计算所需的前一时刻信号值
  prevZ: { blink: null, head: null, rtCV: null },
  prevFusedS: null,

  // ── 逐 trial γ̂ 日志（分信号存储，供 WLS 聚合用）
  // entries: [{ gammaHat, weight }]，weight = |ΔSₜ|
  gammaLog: { blink: [], head: [], rtCV: [], d: [] },

  // ── WLS 聚合后的各信号反馈增益 γ̄
  // 论文说明：γ̄_k = 单信号 k 在 Block A/B/C 中驱动状态回归的平均增益；
  //   γ̄_D = Block D 真反馈融合信号的综合反馈增益（核心因变量之一）
  gammaBar: { blink: 0, head: 0, rtCV: 0, d: 0 },

  // ── 归一化权重 w1-w3（正比于 |γ̄_k|，反映各信号反馈贡献）
  // 论文说明：权重由单信号反馈阶段实测的增益幅度决定，
  //   反馈驱动效果越强的信号在 Block D 融合时占比越高
  weights: { blink: 0.333, head: 0.333, rtCV: 0.334 },

  // 暂停
  paused: false,
  pauseLog: [],
  pauseStart: null,

  // 完成
  completionCode: null,
  rewardChoice: null,
};

// ============================================================
// 2. 工具函数
// ============================================================
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function generateCode() {
  const n = Math.floor(1000 + Math.random() * 9000);
  const alpha = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const l = alpha[Math.floor(Math.random() * alpha.length)];
  return `NB-${n}-${l}`;
}

function arrMean(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}
function arrStd(arr) {
  if (arr.length < 2) return 1;
  const m = arrMean(arr);
  return Math.sqrt(arr.map(x => (x - m) ** 2).reduce((a, b) => a + b, 0) / arr.length);
}

// 普通最小二乘线性回归
// xs: 自变量数组（此处为 trial 序号），ys: 因变量数组（信号值）
// 返回 { beta: 斜率/trial, intercept: y截距 }
// 论文说明：β 估计漂移窗口内信号的自然线性趋势，
// 用于在 Block D 中从当前信号中减去预期自然漂移，
// 从而隔离出反馈干预效应。
function linearRegression(xs, ys) {
  const n = xs.length;
  if (n < 3) return { beta: 0, intercept: arrMean(ys) };
  const mx = arrMean(xs), my = arrMean(ys);
  const ssxy = xs.reduce((s, x, i) => s + (x - mx) * (ys[i] - my), 0);
  const ssxx = xs.reduce((s, x)    => s + (x - mx) ** 2, 0);
  const beta = ssxx > 0 ? ssxy / ssxx : 0;
  return { beta, intercept: my - beta * mx };
}

// Pearson 积差相关系数
// 用于 Block A/B/C 中计算各信号与逐试次正确率的相关方向
function pearsonR(xs, ys) {
  const n = xs.length;
  if (n < 3) return 0;
  const mx = arrMean(xs), my = arrMean(ys);
  const num = xs.reduce((s, x, i) => s + (x - mx) * (ys[i] - my), 0);
  const dx  = Math.sqrt(xs.reduce((s, x) => s + (x - mx) ** 2, 0));
  const dy  = Math.sqrt(ys.reduce((s, y) => s + (y - my) ** 2, 0));
  return (dx * dy) > 1e-9 ? num / (dx * dy) : 0;
}

// ── WLS 聚合 γ̂ 数组 → γ̄ ────────────────────────────────────
// entries: [{gammaHat, weight}]，weight = |ΔSₜ|
// 论文说明：因 γ̂ 在 ΔSₜ→0 时方差发散（异方差），采用 WLS 以 |ΔSₜ| 为权重，
//   使状态偏差较大（估计更可靠）的 trial 贡献更多权重。
//   参考：Carroll & Ruppert (1988) Transformation and Weighting in Regression.
function computeWLSGamma(entries) {
  const valid = entries.filter(e => e.weight > 0.05);
  if (valid.length < 3) return 0;
  const num = valid.reduce((s, e) => s + e.weight * e.gammaHat, 0);
  const den = valid.reduce((s, e) => s + e.weight, 0);
  return den > 1e-9 ? num / den : 0;
}

// ── 单信号 z 分（β_k=0 假设：信号视为稳定，只做均值归一化）
// 论文说明：本研究假设三个生理/行为信号在无干预条件下不存在系统性时间漂移
//   （即 β_k=0），因此信号偏差直接以均值为基线计算 z 分，
//   不应用时间校正项（intercept + β·t）。
//   naturalBeta 字段仍会从漂移窗口估计（用于邮件报告和理论参考），
//   但不纳入信号 γ̂ 的计算公式。
function getSingleZ(key) {
  if (!state.baseline) return 0;
  const b = state.baseline;
  if (key === 'blink') return (state.blinkRate - b.blinkMean) / b.blinkStd;
  if (key === 'head') {
    const h = Math.abs(state.headYaw) + Math.abs(state.headPitch);
    return (h - b.headMean) / b.headStd;
  }
  if (key === 'rtCV') {
    if (state.rtHistory.length < 5) return 0;
    return (state.rtCV - b.rtCVMean) / b.rtCVStd;
  }
  return 0;
}

// ── 三信号加权定向融合 Sₜ（Block D 用）──────────────────────
// Sₜ = Σ wₖ × (−directionK × zₖ)，正值=认知状态好，负值=状态差
// 论文说明：direction=1 表示"信号↑=状态差"（默认），
//   此时 -direction × z = -z，当 z>0（信号高→状态差）时 Sₜ<0 正确表示差状态。
//   direction=-1 表示"信号↑=状态好"（Block A/B/C 验证后翻转），
//   此时 -direction × z = +z，当 z>0（信号高→状态好）时 Sₜ>0 正确。
function getFusedS() {
  if (!state.baseline) return 0;
  const w = state.weights;
  const sB = -state.directionBlink * getSingleZ('blink');
  const sH = -state.directionHead  * getSingleZ('head');
  const sR = state.rtHistory.length >= 5 ? -state.directionRT * getSingleZ('rtCV') : 0;
  const wR = state.rtHistory.length >= 5 ? w.rtCV : 0;
  const wTotal = w.blink + w.head + wR;
  if (wTotal < 1e-6) return 0;
  return (w.blink * sB + w.head * sH + wR * sR) / wTotal;
}

// ── 归一化权重计算 + 方向系数更新（三个 Block 全完成后调用）────
// 方向：sign(γ̄_k) > 0 → 默认方向（信号↑=状态差）有效，保持 direction=1
//        sign(γ̄_k) ≤ 0 → 默认方向无效或逆向，翻转为 direction=-1
// 权重 ∝ |γ̄_k|（贡献越大权重越高），全零时退回等权重
// 论文说明：权重由单信号闭环反馈的实测增益幅度 |γ̄_k| 决定，
//   方向由 sign(γ̄_k) 决定而非先验假设，两者均由 Block A/B/C 实测得出。
function computeAndUpdateWeights() {
  const gB = state.gammaBar.blink;
  const gH = state.gammaBar.head;
  const gR = state.gammaBar.rtCV;

  // 方向系数（direction=1：保持默认，信号↑=状态差；-1：翻转）
  state.directionBlink = gB > 0 ? 1 : -1;
  state.directionHead  = gH > 0 ? 1 : -1;
  state.directionRT    = gR > 0 ? 1 : -1;

  // 归一化权重
  const total = Math.abs(gB) + Math.abs(gH) + Math.abs(gR);
  if (total < 1e-6) {
    state.weights = { blink: 0.333, head: 0.333, rtCV: 0.334 };
  } else {
    state.weights = { blink: Math.abs(gB)/total, head: Math.abs(gH)/total, rtCV: Math.abs(gR)/total };
  }
  console.log('γ̄ 汇总:', { blink: gB?.toFixed(3), head: gH?.toFixed(3), rtCV: gR?.toFixed(3) });
  console.log('方向系数:', { blink: state.directionBlink, head: state.directionHead, rt: state.directionRT });
  console.log('归一化权重 w1-w3:', state.weights);
}

function calcEAR(pts) {
  const A = Math.hypot(pts[1].x - pts[5].x, pts[1].y - pts[5].y);
  const B = Math.hypot(pts[2].x - pts[4].x, pts[2].y - pts[4].y);
  const C = Math.hypot(pts[0].x - pts[3].x, pts[0].y - pts[3].y);
  return C < 1 ? 1 : (A + B) / (2 * C);
}

// 3. 摄像头初始化
// ============================================================
async function initCamera() {
  const video = document.getElementById('camVideo');
  state.video = video;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 320, height: 240, facingMode: 'user' }
    });
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });
    state.cameraReady = true;
    document.getElementById('cameraContainer').style.display = 'block';
    startDetectionLoop();
    return true;
  } catch(e) {
    console.warn('摄像头初始化失败:', e);
    document.getElementById('camStatus').textContent = '⚠ 摄像头不可用';
    return false;
  }
}

// ============================================================
// 4. 面部检测循环
// ============================================================
function startDetectionLoop() {
  async function detect() {
    if (!state.cameraReady || state.paused) {
      requestAnimationFrame(detect); return;
    }
    try {
      const det = await faceapi
        .detectSingleFace(state.video,
          new faceapi.TinyFaceDetectorOptions({ inputSize: 160 }))
        .withFaceLandmarks();

      if (det) {
        const lm = det.landmarks.positions;

        // 眨眼 EAR
        const leftEye  = [lm[36],lm[37],lm[38],lm[39],lm[40],lm[41]];
        const rightEye = [lm[42],lm[43],lm[44],lm[45],lm[46],lm[47]];
        const ear = (calcEAR(leftEye) + calcEAR(rightEye)) / 2;
        if (ear < state.EAR_THRESHOLD) {
          state.earBelowCount++;
        } else {
          if (state.earBelowCount >= state.EAR_CONSEC) {
            state.blinkTimestamps.push(Date.now());
          }
          state.earBelowCount = 0;
        }
        const now = Date.now();
        state.blinkTimestamps = state.blinkTimestamps.filter(t => now - t < 60000);
        state.blinkRate = state.blinkTimestamps.length;

        // 头部姿态
        const nose = lm[30];
        const lOuter = lm[36], rOuter = lm[45];
        const cx = (lOuter.x + rOuter.x) / 2;
        const cy = (lOuter.y + rOuter.y) / 2;
        const fw = Math.abs(rOuter.x - lOuter.x);
        const fh = det.detection.box.height;
        state.headYaw   = fw > 5 ? (nose.x - cx) / (fw / 2) : 0;
        state.headPitch = fh > 5 ? (nose.y - cy) / (fh / 2) : 0;
      }
    } catch(e) { /* 跳过异常帧 */ }

    updateEnergy();
    requestAnimationFrame(detect);
  }
  detect();
}

// ============================================================
// 5. 基线计算（漂移窗口结束后调用）
// ── 同时计算：
//   · 各信号的均值 / SD（用于 z 分归一化）
//   · OLS 线性回归 β 和截距（自然漂移系数，用于 Block D 漂移修正）
//     论文说明：β 为漂移窗口内信号对时间的最小二乘斜率；
//     Ŝ_baseline（截距）为回归直线在窗口起点 t=0 的估计值。
// ============================================================
function computeBaseline() {
  const driftTrials = jsPsych.data.get()
    .filter({ phase: '漂移窗口' })
    .values()
    .filter(d => d.blink_rate !== undefined && d.trial_type_custom === 'stimulus');

  state.driftEndTime = Date.now();

  if (driftTrials.length < 5) {
    state.baseline = {
      blinkMean: 15, blinkStd: 3,
      headMean: 0.1, headStd: 0.05,
      rtCVMean: 0.25, rtCVStd: 0.08,
    };
    // β 使用零值（无漂移假设）
    state.driftBeta      = { blink: 0, head: 0, rtCV: 0 };
    state.driftIntercept = { blink: 15, head: 0.1, rtCV: 0.25 };
    console.warn('基线数据不足，使用默认值');
    return;
  }

  // 时间轴：用 time_elapsed（ms → 秒），以第一条试次为 t=0
  const t0 = driftTrials[0].time_elapsed / 1000;
  const xs = driftTrials.map(d => d.time_elapsed / 1000 - t0);

  const blinkArr = driftTrials.map(d => d.blink_rate);
  const headArr  = driftTrials.map(d => Math.abs(d.head_yaw) + Math.abs(d.head_pitch));
  const rtArr    = driftTrials.filter(d => d.rt_cv > 0).map(d => d.rt_cv);
  const rtXs     = driftTrials.filter(d => d.rt_cv > 0).map(d => d.time_elapsed / 1000 - t0);

  // 均值 / SD（用于 z 分）
  state.baseline = {
    blinkMean: arrMean(blinkArr),
    blinkStd:  Math.max(arrStd(blinkArr), 0.5),
    headMean:  arrMean(headArr),
    headStd:   Math.max(arrStd(headArr), 0.01),
    rtCVMean:  rtArr.length ? arrMean(rtArr) : 0.25,
    rtCVStd:   rtArr.length ? Math.max(arrStd(rtArr), 0.01) : 0.08,
  };

  // OLS 线性回归 → β（自然漂移斜率）和截距（Ŝ_baseline）
  const blinkReg = linearRegression(xs, blinkArr);
  const headReg  = linearRegression(xs, headArr);
  const rtReg    = rtArr.length >= 5
    ? linearRegression(rtXs, rtArr)
    : { beta: 0, intercept: state.baseline.rtCVMean };

  state.driftBeta      = { blink: blinkReg.beta,      head: headReg.beta,      rtCV: rtReg.beta };
  state.driftIntercept = { blink: blinkReg.intercept, head: headReg.intercept, rtCV: rtReg.intercept };

  // ── 自然回归系数 β（无反馈条件 WLS 估计）
  // 各信号先转为简单 z 分（(值-均值)/SD），基线=0，
  // 相邻 trial 对：β̂ₜ = -(zₜ₊₁-zₜ)/zₜ；WLS 以 |zₜ| 为权重
  const toZ = (arr, mean, std) => arr.map(v => (v - mean) / std);
  const wlsBeta = zs => {
    const entries = [];
    for (let i = 0; i < zs.length - 1; i++) {
      if (Math.abs(zs[i]) < 0.1) continue;
      entries.push({ gammaHat: -(zs[i+1] - zs[i]) / zs[i], weight: Math.abs(zs[i]) });
    }
    return computeWLSGamma(entries);
  };
  const blinkZs = toZ(blinkArr, state.baseline.blinkMean, state.baseline.blinkStd);
  const headZs  = toZ(headArr,  state.baseline.headMean,  state.baseline.headStd);
  const rtZs    = rtArr.length >= 5
    ? toZ(rtArr, state.baseline.rtCVMean, state.baseline.rtCVStd) : [];

  state.naturalBeta = {
    blink: wlsBeta(blinkZs),
    head:  wlsBeta(headZs),
    rtCV:  rtZs.length >= 4 ? wlsBeta(rtZs) : 0,
  };

  console.log('基线计算完成:', state.baseline);
  console.log('漂移回归 β（时间趋势）:', state.driftBeta);
  console.log('截距 Ŝ_baseline:', state.driftIntercept);
  console.log('自然回归系数 β（控制模型）:', state.naturalBeta);
}

// ============================================================
// 6. 能量计算
// ============================================================

// ── Block A/B/C：中性幅度（|ΔSₜ|）→ 颜色 ────────────────────
// 论文说明：A/B/C 阶段色环仅显示信号偏离基线的幅度（无方向），
//   绿色=贴近基线（信号稳定），红色=远离基线（信号波动大）。
//   颜色不暗示"好"或"坏"，避免在方向性验证完成前引入需求特征。
function computeNeutralEnergy(z) {
  return clamp(50 - Math.abs(z) * 18, 5, 95);
}

// ── Block D 真反馈：加权定向融合 Sₜ → ΔSₜ → 颜色 ───────────
// ΔSₜ = Sₜ（因为融合后基线=0）；正值→好状态→绿，负值→差状态→红
// 映射：energy = 50 + Sₜ × 20，clamp 到 0-100
function fusedEnergy() {
  const s = getFusedS();
  return clamp(50 + s * 20, 0, 100);
}

// ── 单信号能量（A/B/C 中立显示）────────────────────────────
function singleSignalEnergy(key) {
  if (!state.baseline) return 50;
  return computeNeutralEnergy(getSingleZ(key));
}

function computeFakeEnergy() {
  state.fakeEnergy += (Math.random() - 0.48) * 4;
  state.fakeEnergy = clamp(state.fakeEnergy, 20, 80);
  return state.fakeEnergy;
}

function computeEnergy() {
  const b = state.currentBlock;
  if (b === 'Block_A')  return singleSignalEnergy('blink');
  if (b === 'Block_B')  return singleSignalEnergy('head');
  if (b === 'Block_C')  return singleSignalEnergy('rtCV');
  if (b === 'Block_D1') return D1_IS_TRUE ? fusedEnergy() : computeFakeEnergy();
  if (b === 'Block_D2') return D2_IS_TRUE ? fusedEnergy() : computeFakeEnergy();
  return 50;
}

function updateEnergy() {
  state.energyLevel = computeEnergy();
  const ring = document.getElementById('energyRing');
  if (!ring) return;
  if (state.energyLevel < 35)      ring.style.borderColor = '#e74c3c';
  else if (state.energyLevel < 65) ring.style.borderColor = '#f39c12';
  else                              ring.style.borderColor = '#2ecc71';
}

// ── Block A/B/C 结束后：聚合单信号 γ̄，存入 gammaBar ────────
// 论文说明：此处不再使用 Pearson r 判断方向；
//   方向 d_k = sign(γ̄_k)，即"反馈在默认方向下是否驱动了状态回归"。
//   γ̄_k > 0 表示反馈有效（信号向基线回归），保持默认方向（信号↑=状态差）；
//   γ̄_k ≤ 0 表示反馈无效或逆向，Block D 中翻转该信号方向。
//   方向和权重统一在 computeAndUpdateWeights() 中整合。
function computeDirectionCoeff(blockName) {
  const keyMap = { Block_A: 'blink', Block_B: 'head', Block_C: 'rtCV' };
  const key = keyMap[blockName];
  if (!key) return;

  const entries = state.gammaLog[key];
  const gammaBar = computeWLSGamma(entries);

  if (blockName === 'Block_A') state.gammaBar.blink = gammaBar;
  if (blockName === 'Block_B') state.gammaBar.head  = gammaBar;
  if (blockName === 'Block_C') state.gammaBar.rtCV  = gammaBar;

  console.log(`γ̄ 聚合 ${blockName} [${key}]: γ̄=${gammaBar.toFixed(3)}, n=${entries.length}个有效对`);
}

// ============================================================
// 7. 键盘节律更新
// ============================================================
function updateRTHistory(rt) {
  if (rt == null || rt <= 0) return;
  state.rtHistory.push(rt);
  if (state.rtHistory.length > 20) state.rtHistory.shift();
  if (state.rtHistory.length >= 5) {
    const m = arrMean(state.rtHistory);
    state.rtCV = m > 0 ? arrStd(state.rtHistory) / m : 0;
  }
}

// ============================================================
// 10. 序列生成
// ============================================================
const LETTERS       = ['B','C','D','F','G','H','J','K'];
const STIM_DURATION  = 500;
const TRIAL_DURATION = 2000;
const TARGET_RATE    = 0.33;

const BLOCK_TRIALS = {
  warmup: 30, highload: 60, drift: 60,
  blockA: 45, blockB: 30,  blockC: 60,
  blockD1: 90, blockD2: 90,
};

function generateSequence(numTrials, nBack, targetRate) {
  const sequence = [], isTarget = [];
  for (let i = 0; i < numTrials; i++) {
    if (i >= nBack && Math.random() < targetRate) {
      sequence.push(sequence[i - nBack]);
      isTarget.push(true);
    } else {
      let letter, attempts = 0;
      do {
        letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
        attempts++;
      } while (i >= nBack && letter === sequence[i - nBack] && attempts < 20);
      sequence.push(letter); isTarget.push(false);
    }
  }
  return { sequence, isTarget };
}

const sequences = {
  warmup:   generateSequence(BLOCK_TRIALS.warmup,   1, TARGET_RATE),
  highload: generateSequence(BLOCK_TRIALS.highload,  2, TARGET_RATE),
  drift:    generateSequence(BLOCK_TRIALS.drift,     2, TARGET_RATE),
  blockA:   generateSequence(BLOCK_TRIALS.blockA,    2, TARGET_RATE),
  blockB:   generateSequence(BLOCK_TRIALS.blockB,    2, TARGET_RATE),
  blockC:   generateSequence(BLOCK_TRIALS.blockC,    2, TARGET_RATE),
  blockD1:  generateSequence(BLOCK_TRIALS.blockD1,   2, TARGET_RATE),
  blockD2:  generateSequence(BLOCK_TRIALS.blockD2,   2, TARGET_RATE),
};

// ============================================================
// 11. N-back Block 构建
// ============================================================
function createNBackBlock(seqObj, blockName, showFeedback, nBack) {
  const { sequence, isTarget } = seqObj;
  const trials = [];

  // 判断该 block 对应哪个 gammaLog 键（A/B/C 各自的单信号，D 用融合）
  const gammaKey =
    blockName === 'Block_A'  ? 'blink' :
    blockName === 'Block_B'  ? 'head'  :
    blockName === 'Block_C'  ? 'rtCV'  :
    (blockName === 'Block_D1' || blockName === 'Block_D2') ? 'd' : null;

  const naturalBetaForBlock =
    blockName === 'Block_A'  ? () => state.naturalBeta.blink :
    blockName === 'Block_B'  ? () => state.naturalBeta.head  :
    blockName === 'Block_C'  ? () => state.naturalBeta.rtCV  :
    () => state.weights.blink * state.naturalBeta.blink
        + state.weights.head  * state.naturalBeta.head
        + state.weights.rtCV  * state.naturalBeta.rtCV;

  sequence.forEach((letter, i) => {
    // 注视点
    trials.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation">+</div>',
      choices: 'NO_KEYS',
      trial_duration: 300,
      on_start: function() {
        state.currentBlock = blockName;
        document.getElementById('keyHint').style.display = 'block';
        document.getElementById('ringLegend').style.display = 'block';
      },
      data: { phase: blockName, trial_type_custom: 'fixation' }
    });

    // 「无需操作」提示：前 nBack 个字母不需要作答
    // 论文说明：因 n-back 任务第一个有效比较发生在第 nBack+1 个字母，
    //   前 nBack 个字母显示灰色提示，避免被试焦虑或作出无意义响应。
    const isWarmupTrial = i < nBack;
    const noActionHint = isWarmupTrial
      ? `<div style="font-size:15px;color:#888;margin-top:6px">（前${nBack}个字母无需作答）</div>`
      : '';

    // 字母刺激
    trials.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return `
          <div class="letter-display">${letter}</div>
          ${noActionHint}
          <div class="phase-label">${blockName} &nbsp;|&nbsp; ${i+1} / ${sequence.length}</div>
          <div id="energyRing"></div>
        `;
      },
      choices: ['f', 'j'],
      trial_duration: TRIAL_DURATION,
      stimulus_duration: STIM_DURATION,
      response_ends_trial: false,
      on_finish: function(data) {
        const responded = data.response !== null;
        const correct =
          ( isTarget[i] && data.response === 'j') ||
          (!isTarget[i] && data.response === 'f');

        data.phase             = blockName;
        data.trial_index_block = i;
        data.letter            = letter;
        data.is_target         = isTarget[i];
        data.responded         = responded;
        data.correct           = correct;
        data.blink_rate        = state.blinkRate;
        data.head_yaw          = +state.headYaw.toFixed(3);
        data.head_pitch        = +state.headPitch.toFixed(3);
        data.rt_cv             = +state.rtCV.toFixed(3);
        data.energy            = +state.energyLevel.toFixed(1);
        data.trial_type_custom = 'stimulus';
        if (blockName === 'Block_D1') data.feedback_type = D1_IS_TRUE ? 'true' : 'fake';
        if (blockName === 'Block_D2') data.feedback_type = D2_IS_TRUE ? 'true' : 'fake';

        if (responded) updateRTHistory(data.rt);

        // ── 逐 trial 反馈增益 γ̂ 计算 ────────────────────────
        // A/B/C 模型（β_k=0）：γ̂ = -(S_{t+1}-S_t) / ΔS_t
        // Block D 模型（含复合β）：γ̂ = -(S_{t+1}-S_t) / ΔS_t - β_composite
        if (gammaKey && state.baseline) {
          let currS;
          if (gammaKey === 'd') {
            currS = getFusedS();
            data.fused_s = +currS.toFixed(3);
            if (state.prevFusedS !== null) {
              const deltaS = state.prevFusedS;
              if (Math.abs(deltaS) > 0.05) {
                const betaComposite = naturalBetaForBlock();
                const gammaHat = -(currS - state.prevFusedS) / deltaS - betaComposite;
                state.gammaLog.d.push({ gammaHat, weight: Math.abs(deltaS) });
                data.gamma_hat = +gammaHat.toFixed(3);
              }
            }
            state.prevFusedS = currS;
          } else {
            currS = getSingleZ(gammaKey);
            data.single_z = +currS.toFixed(3);
            const prev = state.prevZ[gammaKey];
            if (prev !== null) {
              const deltaS = prev;
              if (Math.abs(deltaS) > 0.05) {
                // β_k=0：不减自然回归项
                const gammaHat = -(currS - prev) / deltaS;
                state.gammaLog[gammaKey].push({ gammaHat, weight: Math.abs(deltaS) });
                data.gamma_hat = +gammaHat.toFixed(3);
              }
            }
            state.prevZ[gammaKey] = currS;
          }
        }
      }
    });

    // 热身阶段即时正误反馈
    if (showFeedback) {
      trials.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          const last = jsPsych.data.get().last(1).values()[0];
          const ok = last && last.correct;
          return `<div style="font-size:52px;margin-top:80px;color:${ok?'#2ecc71':'#e74c3c'}">${ok?'✓ 正确':'✗ 错误'}</div>`;
        },
        choices: 'NO_KEYS',
        trial_duration: 500,
        data: { phase: blockName, trial_type_custom: 'feedback' }
      });
    }
  });

  return trials;
}

// ============================================================
// EmailJS 数据发送
// ── 配置说明：在 emailjs.com 注册并填写以下三个 ID
//    SERVICE_ID:  你的 Email Service（如 Gmail）的服务 ID
//    TEMPLATE_ID: 邮件模板 ID（模板中用 {{message}} 接收正文）
//    PUBLIC_KEY:  账号 Public Key（在 Account → API Keys 中查看）
// ============================================================
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';

// 聚合单个 block 的绩效摘要
function aggregateBlock(phaseName) {
  const trials = jsPsych.data.get()
    .filter({ phase: phaseName, trial_type_custom: 'stimulus' })
    .values()
    .filter(d => d.responded !== undefined);
  if (!trials.length) return null;
  const acc = trials.filter(d => d.correct).length / trials.length;
  const rts  = trials.filter(d => d.rt > 0).map(d => d.rt);
  const energies = trials.filter(d => d.energy !== undefined).map(d => d.energy);
  return {
    n:        trials.length,
    acc:      (acc * 100).toFixed(1) + '%',
    rt:       rts.length ? Math.round(arrMean(rts)) + 'ms' : 'N/A',
    energy:   energies.length ? arrMean(energies).toFixed(1) : 'N/A',
  };
}

function buildEmailBody(contact, reward) {
  const now  = new Date().toISOString().slice(0, 19).replace('T', ' ');
  const b    = state.baseline    || {};
  const nb   = state.naturalBeta || {};
  const gb   = state.gammaBar    || {};
  const w    = state.weights     || {};
  const intc = state.driftIntercept || {};

  const fmt = (v, d=3) => (v != null && isFinite(v)) ? (+v).toFixed(d) : 'N/A';

  const blk = name => {
    const s = aggregateBlock(name);
    return s ? `${name.padEnd(14)}: 准确率=${s.acc}  RT=${s.rt}  均值能量=${s.energy}` : `${name.padEnd(14)}: 无数据`;
  };

  let tlxLine = 'N/A';
  try {
    const tlxData = jsPsych.data.get().filter({ trial_type: 'survey-html-form' }).last(1).values()[0] || {};
    const r = tlxData.response || {};
    tlxLine = Object.entries(r).map(([k,v]) => `${k}=${v}`).join('  ');
  } catch(e) {}

  const pauseTotal = state.pauseLog.reduce((s, p) => s + (p.end - p.start), 0);
  const wTotal = (w.blink||0) + (w.head||0) + (w.rtCV||0);

  return `
=== 参与者 ===
专属码: ${state.completionCode || 'N/A'}  |  时间: ${now}
奖励选择: ${reward || '未填写'}  |  联系方式: ${contact || '未填写'}
Block A/B/C 顺序: ${BLOCK_ABC_ORDER.join('-')}

=== 个体基线（漂移窗口 OLS 回归）===
Ŝ_baseline（截距）:  眨眼=${fmt(intc.blink,2)}/min  头部=${fmt(intc.head,3)}  按键CV=${fmt(intc.rtCV,3)}
SD（归一化用）:       眨眼=${fmt(b.blinkStd,2)}      头部=${fmt(b.headStd,3)}  按键CV=${fmt(b.rtCVStd,3)}

=== 自然回归系数 β（漂移窗口 WLS 估计，理论参考值，不纳入 A/B/C 公式）===
β_blink=${fmt(nb.blink,4)}  β_head=${fmt(nb.head,5)}  β_rtCV=${fmt(nb.rtCV,5)}
（注：本研究假设 β_k=0，上述值为漂移窗口实测估计，仅供参考）

=== 单信号反馈增益 γ̄（Block A/B/C WLS 聚合）===
γ̄1 眨眼 (Block A): ${fmt(gb.blink)}  →  direction=${state.directionBlink}  (${state.directionBlink===1?'信号↑=状态差':'信号↑=状态好'})
γ̄2 头部 (Block B): ${fmt(gb.head)}  →  direction=${state.directionHead}  (${state.directionHead===1?'信号↑=状态差':'信号↑=状态好'})
γ̄3 按键 (Block C): ${fmt(gb.rtCV)}  →  direction=${state.directionRT}  (${state.directionRT===1?'信号↑=状态差':'信号↑=状态好'})

=== 归一化权重 w1-w3（∝ |γ̄_k|）===
w1 眨眼=${fmt(w.blink)}  w2 头部=${fmt(w.head)}  w3 按键=${fmt(w.rtCV)}  总和=${fmt(wTotal)}

=== Block D 复合反馈增益 γ̄_D（真反馈 block）===
γ̄_D = ${fmt(gb.d)}  （真反馈 block: ${D1_IS_TRUE ? 'D1' : 'D2'}）

=== Block 绩效摘要 ===
${blk('热身(1-back)')}
${blk('高负荷')}
${blk('漂移窗口')}
${blk('Block_A')}
${blk('Block_B')}
${blk('Block_C')}
${blk('Block_D1')}  [${D1_IS_TRUE ? '真反馈' : '假反馈'}]
${blk('Block_D2')}  [${D2_IS_TRUE ? '真反馈' : '假反馈'}]

=== NASA-TLX ===
${tlxLine}

=== 实验控制 ===
D1=${D1_IS_TRUE?'真反馈':'假反馈'}  D2=${D2_IS_TRUE?'真反馈':'假反馈'}
暂停次数=${state.pauseLog.length}  总暂停=${Math.round(pauseTotal/1000)}s
`.trim();
}

async function sendExperimentEmail(contact, reward) {
  // 检查 emailjs 是否已载入
  if (typeof emailjs === 'undefined') {
    console.warn('EmailJS 未载入，跳过发送。本地 body:', buildEmailBody(contact, reward));
    return;
  }
  try {
    emailjs.init(EMAILJS_PUBLIC_KEY);
    const body = buildEmailBody(contact, reward);
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { message: body });
    console.log('✅ 实验数据邮件已发送');
  } catch(e) {
    console.error('EmailJS 发送失败:', e);
  }
}

function makeNASATLX() {
  const dims = [
    { name: 'mental_demand',   label: '脑力需求',  desc: '任务需要多少思考、判断和记忆？' },
    { name: 'physical_demand', label: '体力需求',  desc: '任务需要多少身体活动（如眼手协调）？' },
    { name: 'temporal_demand', label: '时间压力',  desc: '任务节奏有多紧迫、时间是否充裕？' },
    { name: 'performance',     label: '完成效果',  desc: '你对自己的表现有多满意？（左=非常满意）' },
    { name: 'effort',          label: '努力程度',  desc: '你为完成任务付出了多少努力？' },
    { name: 'frustration',     label: '挫败感',    desc: '你感到多沮丧、烦躁或压力？' },
  ];

  const slidersHtml = dims.map(d => `
    <div class="tlx-item">
      <label>${d.label}</label>
      <span class="tlx-desc">${d.desc}</span>
      <div class="slider-row">

        <span>高</span>
      </div>
      <div class="slider-val" id="val_${d.name}">50</div>

  return {
    type: jsPsychSurveyHtmlForm,
    preamble: `
      <div style="max-width:600px;margin:0 auto">
        <h2 style="text-align:center">主观负荷评估（NASA-TLX）</h2>
        <p style="text-align:center;color:#888;font-size:15px">
          请根据刚才整体的实验体验，拖动滑块评分（约1分钟）

      </div>`,
    html: `<div style="max-width:600px;margin:0 auto">${slidersHtml}</div>`,
    button_label: '提交问卷',
    on_start: function() {
      document.getElementById('keyHint').style.display = 'none';
      document.getElementById('ringLegend').style.display = 'none';
    }
  };
}

let jsPsych;

function buildTimeline() {
  const tl = [];

  // ── 全局指导语 ──
  tl.push(makeInstruction(`
    <h2>欢迎参加本实验</h2>
    <p>本实验共约 <strong>17.5 分钟</strong>，请在安静、光线充足的环境中完成。</p>
    <p>⚠ 实验要求<strong>全程保持专注</strong>，请提前关闭无关应用，避免打扰。</p>
    <hr class="section">
    <p><strong>任务说明：</strong>屏幕中央会依次出现一系列字母，你需要判断：
    <strong>当前字母是否与若干个之前的字母相同？</strong></p>
    <div class="highlight-box">
      🟦 相同（目标）→ 按 <strong>J</strong> 键（右手食指）<br>
      🟥 不同（非目标）→ 按 <strong>F</strong> 键（左手食指）<br>
      <span style="font-size:14px;color:#666">每个字母最多作答一次，无需抢按</span>
    </div>
    <p>屏幕右侧会出现一个<strong>彩色圆环</strong>，实时反映你的专注状态，仅供参考，不影响计分。</p>
    ${RING_LEGEND_HTML}
    <p style="font-size:14px;color:#666;margin-top:14px">
      ⚠ 如遇紧急情况（如需短暂离座），可按 <b>Esc</b> 暂停。
      非必要请勿使用，频繁暂停会影响数据质量。
    </p>
  `));

  // ── 热身：1-back ──
  tl.push(makeInstruction(`
    <h2>🔥 热身阶段（约1分钟）</h2>
    <p>热身使用 <strong>1-back</strong> 规则（比正式实验更简单）：</p>
    <div class="highlight-box">
      判断当前字母是否与<strong>紧邻的上一个</strong>字母相同
    </div>
    <p>示例：B → <span style="color:#f39c12;font-weight:bold">B</span>（相同，按 <b>J</b>）&emsp;
            B → C（不同，按 <b>F</b>）</p>
    <p>本阶段有<strong>即时正误反馈</strong>，帮助你熟悉节奏。</p>
    <p style="color:#888;font-size:14px">⚠ 热身数据不计入正式分析。</p>
  `));
  tl.push(...createNBackBlock(sequences.warmup, '热身(1-back)', true, 1));

  // ── 切换到2-back ──
  tl.push(makeInstruction(`
    <h2>⚡ 正式开始：切换到 2-back</h2>
    <p>从现在起难度提升，使用 <strong>2-back</strong> 规则：</p>
    <div class="highlight-box">
      判断当前字母是否与 <strong>2个之前</strong> 的字母相同
    </div>
    <p>示例：B → C → <span style="color:#f39c12;font-weight:bold">B</span>（与2个前的B相同，按 <b>J</b>）<br>
    &emsp;&emsp;&emsp; B → C → D（不同，按 <b>F</b>）</p>
    <p>此阶段 <strong>无反馈</strong>，请尽力作答。后续所有阶段均使用此规则。</p>
  `));
  tl.push(...createNBackBlock(sequences.highload, '高负荷', false, 2));

  // ── 漂移窗口 ──
  tl.push(makeInstruction(`
    <h2>📊 状态基准采集（约2分钟）</h2>
    <p>继续 2-back 任务，保持自然节奏。</p>
    <p>系统将在此阶段建立你的<strong>个体状态基准</strong>，用于后续能量环的个性化校准。</p>
  `));
  tl.push(...createNBackBlock(sequences.drift, '漂移窗口', false, 2));
  tl.push(baselineTriggerTrial);

  // ── Block A/B/C（顺序随机化，控制练习效应）──
  // 论文说明：三个单信号验证 block 采用被试间伪随机顺序（BLOCK_ABC_ORDER），
  //   每名被试在实验开始时随机决定顺序，结果记录在数据中。
  for (const letter of BLOCK_ABC_ORDER) {
    const cfg = BLOCK_ABC_CONFIG[letter];
    const seqKey = { A: 'blockA', B: 'blockB', C: 'blockC' }[letter];
    tl.push(makeInstruction(`
      <h2>${cfg.title}</h2>
      <p>继续 2-back 任务。</p>
      <p>${cfg.desc}</p>
      ${RING_LEGEND_HTML}
    `));
    tl.push(...createNBackBlock(sequences[seqKey], cfg.phaseName, false, 2));
    tl.push(makeDirectionTrigger(cfg.phaseName));
  }

  // ── 三信号全部完成后：整合权重和方向（无感知）──
  tl.push(weightsUpdateTrigger);

  // ── Block D-1 ──
  tl.push(makeInstruction(`
    <h2>Block D-1（约3分钟）</h2>
    <p>继续 2-back 任务。</p>
    <p>能量环现在综合 <strong>眨眼 + 头部 + 按键</strong> 三种信号实时变化。</p>
    ${RING_LEGEND_HTML}
  `));
  tl.push(...createNBackBlock(sequences.blockD1, 'Block_D1', false, 2));
  tl.push(makeBlockDGammaTrigger('Block_D1'));

  // ── 清洗期倒计时 ──
  tl.push(makeCountdownRest(60, '清洗期休息（1分钟）'));

  // ── Block D-2 ──
  tl.push(makeInstruction(`
    <h2>Block D-2（约3分钟）</h2>
    <p>最后一段 2-back 任务，请保持与之前相同的认真态度。</p>
    <p>能量环继续综合三种信号实时变化。</p>
    ${RING_LEGEND_HTML}
  `));
  tl.push(...createNBackBlock(sequences.blockD2, 'Block_D2', false, 2));
  tl.push(makeBlockDGammaTrigger('Block_D2'));

  // ── NASA-TLX 问卷 ──
  tl.push(makeInstruction(`
    <h2>任务部分完成！🙏</h2>
    <p>感谢你的坚持。接下来是一份关于刚才体验的<strong>简短主观评估</strong>，约1分钟。</p>
    <p>请根据你在整个实验中的总体感受来作答，没有对错之分。</p>
  `));
  tl.push(makeNASATLX());

  return tl;
}

async function startExperiment() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('loadingScreen').style.display = 'none';

  jsPsych = initJsPsych({
    display_element: 'jspsych-target',
    on_finish: function() {
      // 记录真伪分配结果
      jsPsych.data.addProperties({
        D1_feedback: D1_IS_TRUE ? 'true' : 'fake',
        D2_feedback: D2_IS_TRUE ? 'true' : 'fake',
        block_abc_order: BLOCK_ABC_ORDER.join(''),
        pause_count: state.pauseLog.length,
        total_pause_ms: state.pauseLog.reduce((s,p) => s + (p.end - p.start), 0),
      });

      state.completionCode = generateCode();
      document.getElementById('codeDisplay').textContent = state.completionCode;
      document.getElementById('completionScreen').classList.add('visible');
      document.getElementById('keyHint').style.display = 'none';
      document.getElementById('ringLegend').style.display = 'none';

      // 实验结束自动发送行为数据邮件（不含联系方式）
      sendExperimentEmail(null, null);
      console.log('实验完成！数据条数:', jsPsych.data.get().count());
    }
  });

  jsPsych.run(buildTimeline());
}
